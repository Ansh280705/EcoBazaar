{% extends "layout.html" %}
{% block content %}
<style>
    body { background-color: #141F1F !important; color: #D4E3E3 !important; }
    .leaderboard-container { max-width: 900px; margin: 0 auto; padding: 2rem; padding-top: 6rem; }
    .leaderboard-header { text-align: center; margin-bottom: 3rem; }
    .leaderboard-header h2 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #ffffff 0%, #22c55e 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    
    .leaderboard-card {
        background: rgba(28, 43, 43, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(159, 192, 193, 0.1);
        border-radius: 32px;
        padding: 2rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .ranking-item {
        display: flex;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid rgba(159, 192, 193, 0.1);
        transition: all 0.3s ease;
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-item:hover { background: rgba(255, 255, 255, 0.03); transform: scale(1.01); }
    
    .rank { font-size: 1.5rem; font-weight: 800; color: #9FC0C1; width: 50px; }
    .user-info { flex-grow: 1; }
    .user-email { font-weight: 600; color: #ffffff; font-size: 1.1rem; }
    .user-badges { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .badge { padding: 2px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge-solar { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
    .badge-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
    
    .points { font-size: 1.5rem; font-weight: 800; color: #22c55e; }
</style>

<div class="leaderboard-container">
    <div class="leaderboard-header">
        <h2>Eco Leaderboard</h2>
        <p>Top sustainability champions this month</p>
    </div>
    
    <div class="leaderboard-card">
        <div id="leaderboard-list">
            <!-- Dynamic loading -->
            <p style="text-align: center; color: #64748b;">Loading ranking...</p>
        </div>
    </div>
</div>

<script>
    fetch('/api/leaderboard')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('leaderboard-list');
            if (data.leaderboard.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #64748b;">No rewards data yet. Start trading to earn points!</p>';
                return;
            }
            
            list.innerHTML = data.leaderboard.map((item, index) => `
                <div class="ranking-item">
                    <div class="rank">#${index + 1}</div>
                    <div class="user-info">
                        <div class="user-email">${item.email}</div>
                        <div class="user-badges">
                            ${item.badges.map(b => `<span class="badge ${b === 'Solar Champion' ? 'badge-solar' : 'badge-green'}">${b}</span>`).join('')}
                        </div>
                    </div>
                    <div class="points">${item.points} <span style="font-size: 0.8rem; color: #64748b">PTS</span></div>
                </div>
            `).join('');
        });
</script>
{% endblock content %}
