{% extends "layout.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div style="background: rgba(28, 43, 43, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(159, 192, 193, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);; padding: 3rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="color: #D4E3E3; margin-bottom: 1rem; font-size: 2rem; letter-spacing: -0.5px;">Welcome to Eco Bazzar</h2>
        <p style="color: #9FC0C1; margin-bottom: 2.5rem;">To continue, please select your primary role on the platform. This decision is permanent.</p>
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <button type="submit" name="role" value="buyer" class="role-btn" style="background: rgba(59, 130, 246, 0.05); border: 2px solid rgba(59, 130, 246, 0.5); color: #9FC0C1; padding: 1.5rem; border-radius: 12px; font-size: 1.25rem; font-weight: bold; cursor: pointer; transition: all 0.2s;">
                Become a Buyer
                <div style="font-size: 0.85rem; color: #64748b; font-weight: normal; margin-top: 0.5rem;">Purchase clean energy from local producers</div>
            </button>
            <button type="submit" name="role" value="seller" class="role-btn" style="background: rgba(34, 197, 94, 0.05); border: 2px solid rgba(34, 197, 94, 0.5); color: #22c55e; padding: 1.5rem; border-radius: 12px; font-size: 1.25rem; font-weight: bold; cursor: pointer; transition: all 0.2s;">
                Become a Seller
                <div style="font-size: 0.85rem; color: #64748b; font-weight: normal; margin-top: 0.5rem;">Generate and sell your excess solar energy</div>
            </button>
        </form>
    </div>
</div>
<style>
    .role-btn:hover {
        transform: translateY(-4px);
    }
    .role-btn[value="buyer"]:hover {
        background: rgba(59, 130, 246, 0.15) !important;
        border-color: #9FC0C1 !important;
    }
    .role-btn[value="seller"]:hover {
        background: rgba(34, 197, 94, 0.15) !important;
        border-color: #22c55e !important;
    }
</style>
{% endblock %}
